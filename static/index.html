<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scrapper — dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #111;
            --surface: #191919;
            --border: #2a2a2a;
            --text: #ccc;
            --text-dim: #666;
            --text-bright: #eee;
            --green: #3ddc84;
            --red: #e55;
            --yellow: #e5c07b;
            --blue: #61afef;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ── */
        .shell {
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 20px 80px;
        }

        /* ── Header ── */
        .topbar {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }
        .topbar h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-bright);
            letter-spacing: -0.3px;
        }
        .topbar span {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* ── Section ── */
        section { margin-bottom: 36px; }
        .section-label {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        /* ── Input Row ── */
        .input-row {
            display: flex;
            gap: 1px;
            background: var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .input-row input {
            flex: 1;
            background: var(--surface);
            border: none;
            padding: 12px 14px;
            color: var(--text-bright);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            outline: none;
        }
        .input-row input::placeholder { color: var(--text-dim); }
        .input-row select {
            background: var(--surface);
            border: none;
            padding: 12px 14px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            -webkit-appearance: none;
        }
        .input-row button {
            background: var(--surface);
            border: none;
            padding: 12px 20px;
            color: var(--text-bright);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .input-row button:hover { background: #222; }
        .input-row button:disabled { color: var(--text-dim); cursor: default; }

        /* ── Status ── */
        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            margin-top: 10px;
            min-height: 20px;
            color: var(--text-dim);
        }
        .status[data-state="loading"] { color: var(--yellow); }
        .status[data-state="done"] { color: var(--green); }
        .status[data-state="error"] { color: var(--red); }

        /* ── Image Results ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 2px;
        }
        .grid-item {
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
            background: var(--surface);
        }
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(15%);
            transition: filter 0.2s;
        }
        .grid-item:hover img { filter: none; }
        .grid-item a {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-end;
            padding: 8px;
            background: linear-gradient(transparent 60%, rgba(0,0,0,0.7));
            opacity: 0;
            transition: opacity 0.2s;
            text-decoration: none;
        }
        .grid-item:hover a { opacity: 1; }
        .grid-item a span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #fff;
            background: rgba(255,255,255,0.12);
            padding: 3px 8px;
            border-radius: 3px;
        }

        .result-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .empty {
            padding: 48px 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* ── Profiles ── */
        .profiles-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .profile-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            padding: 10px 14px;
        }
        .profile-row .name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-bright);
        }
        .profile-row .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 3px;
        }
        .tag-1 { color: var(--green); background: rgba(61,220,132,0.1); }
        .tag-2 { color: var(--yellow); background: rgba(229,192,123,0.1); }
        .tag-3 { color: #e5a; background: rgba(238,85,170,0.1); }
        .tag-4 { color: var(--red); background: rgba(238,85,85,0.1); }

        .profiles-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .profiles-header button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: color 0.15s, border-color 0.15s;
        }
        .profiles-header button:hover { color: var(--text); border-color: #444; }

        @media (max-width: 600px) {
            .input-row { flex-direction: column; }
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="topbar">
            <h1>scrapper</h1>
            <span>fashion image extractor</span>
        </div>

        <section>
            <div class="section-label">URL do Produto</div>
            <div class="input-row">
                <input type="text" id="urlInput" placeholder="cole a url aqui" autocomplete="off" spellcheck="false" />
                <select id="levelSelect">
                    <option value="1">lvl 1</option>
                    <option value="2">lvl 2</option>
                    <option value="3">lvl 3</option>
                    <option value="4">lvl 4</option>
                </select>
                <button id="btnGo" onclick="run()">extrair</button>
            </div>
            <div class="status" id="status"></div>
        </section>

        <section id="resultsSection" style="display:none;">
            <div class="section-label">Resultado</div>
            <div class="result-count" id="resultCount"></div>
            <div class="grid" id="grid"></div>
        </section>

        <div class="empty" id="emptyMsg">nenhuma busca realizada</div>

        <section>
            <div class="profiles-header">
                <div class="section-label" style="margin:0;">Domínios Conhecidos</div>
                <button onclick="loadProfiles()">atualizar</button>
            </div>
            <div id="profilesContainer">
                <div class="empty">carregando...</div>
            </div>
        </section>
    </div>

    <script>
        const API = location.origin;

        function setStatus(state, msg) {
            const el = document.getElementById('status');
            el.dataset.state = state;
            el.textContent = msg;
        }

        async function run() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            const level = +document.getElementById('levelSelect').value;
            const btn = document.getElementById('btnGo');
            btn.disabled = true;

            setStatus('loading', 'processando...');
            document.getElementById('emptyMsg').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'none';

            try {
                const t0 = performance.now();
                const res = await fetch(`${API}/api/extract`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, escalation_level: level })
                });
                if (!res.ok) {
                    const e = await res.json();
                    throw new Error(e.detail || res.statusText);
                }
                const imgs = await res.json();
                const sec = ((performance.now() - t0) / 1000).toFixed(1);

                if (!imgs.length) {
                    setStatus('error', `0 imagens · ${sec}s`);
                    document.getElementById('emptyMsg').textContent = 'nenhuma imagem encontrada para essa url';
                    document.getElementById('emptyMsg').style.display = '';
                } else {
                    setStatus('done', `${imgs.length} imagen${imgs.length > 1 ? 's' : ''} · ${sec}s`);
                    render(imgs);
                }
                loadProfiles();
            } catch (e) {
                setStatus('error', e.message);
                document.getElementById('emptyMsg').textContent = 'erro na extração';
                document.getElementById('emptyMsg').style.display = '';
            } finally {
                btn.disabled = false;
            }
        }

        function render(imgs) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            document.getElementById('resultCount').textContent = `${imgs.length} archivo${imgs.length > 1 ? 's' : ''}`;
            document.getElementById('resultsSection').style.display = '';

            imgs.forEach((src, i) => {
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.innerHTML = `
                    <img src="${src}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'" />
                    <a href="${src}" target="_blank"><span>abrir</span></a>
                `;
                grid.appendChild(div);
            });
        }

        async function loadProfiles() {
            const el = document.getElementById('profilesContainer');
            try {
                const res = await fetch(`${API}/api/profiles`);
                const data = await res.json();
                const entries = Object.entries(data);
                if (!entries.length) {
                    el.innerHTML = '<div class="empty">nenhum domínio registrado</div>';
                    return;
                }
                el.innerHTML = `<div class="profiles-list">${entries.map(([d, info]) => {
                    const l = info.escalation_level || 1;
                    return `<div class="profile-row">
                        <span class="name">${d}</span>
                        <span class="tag tag-${l}">lvl ${l}</span>
                    </div>`;
                }).join('')}</div>`;
            } catch {
                el.innerHTML = '<div class="empty" style="color:var(--red)">sem conexão</div>';
            }
        }

        document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
        loadProfiles();
    </script>
</body>
</html>
