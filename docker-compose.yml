version: '3.8'

services:
  fashion-bot-api:
    build: .
    container_name: fashion-bot-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
      # Quantidade de browsers stealth simultâneos (cada um usa ~300-500MB RAM)
      - WORKER_COUNT=${WORKER_COUNT:-3}
      # Timeout máximo por request em segundos
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-120}
